<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Meus Gastos</title>
<meta name="theme-color" content="#1b7f5c">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="title-row">
      <h1 data-i18n="appTitle">Meus Gastos</h1>
      <div class="lang-switch">
        <button type="button" class="lang-btn" data-lang="pt" aria-label="Português">🇧🇷</button>
        <button type="button" class="lang-btn" data-lang="en" aria-label="English">🇺🇸</button>
        <button type="button" class="lang-btn" data-lang="es" aria-label="Español">🇪🇸</button>
      </div>
    </div>
    <select id="monthFilter"></select>
  </header>

  <section class="summary">
    <div class="card fuel">
      <span class="label" data-i18n="labelFuel">Combustível</span>
      <span class="value" id="totalFuel">R$ 0,00</span>
    </div>
    <div class="card food">
      <span class="label" data-i18n="labelFood">Alimentação</span>
      <span class="value" id="totalFood">R$ 0,00</span>
    </div>
    <div class="card total">
      <span class="label" data-i18n="labelTotalMonth">Total do mês</span>
      <span class="value" id="totalAll">R$ 0,00</span>
    </div>
  </section>

  <form id="expenseForm" class="expense-form">
    <div class="category-toggle">
      <button type="button" class="cat-btn fuel active" data-cat="combustivel" data-i18n="catFuelBtn">⛽ Combustível</button>
      <button type="button" class="cat-btn food" data-cat="alimentacao" data-i18n="catFoodBtn">🍔 Alimentação</button>
    </div>
    <input type="hidden" id="category" value="combustivel">

    <div class="row">
      <label for="value" data-i18n="labelValue">Valor (R$)</label>
      <input type="number" id="value" inputmode="decimal" step="0.01" min="0" placeholder="0,00" required>
    </div>

    <div class="row">
      <label for="date" data-i18n="labelDate">Data</label>
      <input type="date" id="date" required>
    </div>

    <div class="row">
      <label for="note" data-i18n="labelNote">Observação (opcional)</label>
      <input type="text" id="note" data-i18n-placeholder="notePlaceholder" placeholder="Ex: posto Shell, mercado...">
    </div>

    <button type="submit" class="save-btn" data-i18n="saveBtn">Adicionar gasto</button>
  </form>

  <section class="history">
    <h2 data-i18n="historyTitle">Histórico</h2>
    <ul id="expenseList" class="expense-list"></ul>
    <p id="emptyState" class="empty-state" data-i18n="emptyState">Nenhum gasto lançado ainda.</p>
  </section>

</div>

<script src="app.js?v=3"></script>
</body>
</html>
